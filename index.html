<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SB Codex</title>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      height: 100vh;
      display: grid;
      grid-template-columns: 220px 1fr 320px;
      overflow: hidden;
    }

    #nav {
      border-right: 1px solid #ddd;
      padding: 10px;
    }

    #book {
      padding: 20px;
      overflow-y: auto;
    }

    #sidebar {
      border-left: 1px solid #ddd;
      padding: 10px;
      overflow-y: auto;
    }

    .kw {
      background: #eef;
      padding: 1px 3px;
      cursor: pointer;
      border-radius: 3px;
    }

    .kw.disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    .card {
      border: 1px solid #ccc;
      border-radius: 6px;
      margin-bottom: 10px;
      padding: 8px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      font-weight: bold;
    }

    .pin {
      cursor: pointer;
    }

    .pinned {
      border-color: black;
    }
  </style>
</head>

<body>
  <div id="nav">
    <h3>Pages</h3>
    <button onclick="loadPage('book.md')">Book</button>
  </div>

  <div id="book"></div>

  <div id="sidebar">
    <h3>Pinned</h3>
    <div id="pinned"></div>

    <h3>Active</h3>
    <div id="active"></div>
  </div>

<script>
let keywords = {};
let active = new Map();
let pinned = new Map();

/* ---------------- LOAD DATA ---------------- */

async function loadKeywords() {
  const res = await fetch('./content/keywords.json');
  keywords = await res.json();
}

async function loadPage(file) {
  const res = await fetch('./content/' + file);
  let md = await res.text();

  renderBook(md);
}

/* ---------------- RENDER MARKDOWN ---------------- */

function renderBook(md) {
  let html = marked.parse(md);

  // keyword replacement
  html = html.replace(/\[\[kw:(.+?)\]\]/g, (m, key) => {
    return `<span class="kw" data-key="${key}" onclick="onKwClick('${key}')">${key}</span>`;
  });

  document.getElementById('book').innerHTML = html;

  refreshKwState();
}

/* ---------------- KEYWORDS ---------------- */

function onKwClick(key) {
  if (active.has(key)) return;

  const data = keywords[key];
  if (!data) return;

  active.set(key, data);
  renderActive();
  refreshKwState();
}

function refreshKwState() {
  document.querySelectorAll('.kw').forEach(el => {
    const key = el.dataset.key;
    if (active.has(key)) {
      el.classList.add('disabled');
    } else {
      el.classList.remove('disabled');
    }
  });
}

/* ---------------- SIDEBAR ---------------- */

function renderActive() {
  const container = document.getElementById('active');
  container.innerHTML = '';

  for (const [key, data] of active.entries()) {
    container.appendChild(createCard(key, data, false));
  }
}

function renderPinned() {
  const container = document.getElementById('pinned');
  container.innerHTML = '';

  for (const [key, data] of pinned.entries()) {
    container.appendChild(createCard(key, data, true));
  }
}

function createCard(key, data, isPinned) {
  const div = document.createElement('div');
  div.className = 'card' + (isPinned ? ' pinned' : '');

  div.innerHTML = `
    <div class="card-header">
      <span>${key}</span>
      <span class="pin">${isPinned ? '📌' : '📍'}</span>
    </div>
    <div>${data.description || ''}</div>
  `;

  div.querySelector('.pin').onclick = () => togglePin(key, data);

  return div;
}

/* ---------------- PIN SYSTEM ---------------- */

function togglePin(key, data) {
  if (pinned.has(key)) {
    pinned.delete(key);
  } else {
    pinned.set(key, data);
  }
  savePinned();
  renderPinned();
}

function savePinned() {
  localStorage.setItem('sb_pinned', JSON.stringify([...pinned]));
}

function loadPinned() {
  const raw = localStorage.getItem('sb_pinned');
  if (!raw) return;

  const arr = JSON.parse(raw);
  pinned = new Map(arr);
}

/* ---------------- INIT ---------------- */

(async function init() {
  await loadKeywords();
  loadPinned();
  renderPinned();
  loadPage('book.md');
})();
</script>

</body>
</html>
